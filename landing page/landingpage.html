<!-- Bootstap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- AOS (Animate On Scroll) -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css" rel="stylesheet">

<style>
    /* Scroll config demandé */
    html { scroll-behavior: smooth; scroll-padding-top: 80px; }

    :root{
        --dark:#0B192C; /* bleu nuit profond */
        --dark-2:#0A1128;
        --cream:#FDFBF7;
        --accent:#F9A826; /* orange/jaune */
        --muted:#7A8CA5;
        --card-radius:18px;
    }

    /* Reset & body */
    *{box-sizing:border-box}
    body{
        font-family: Inter, "DM Sans", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
        margin:0;
        background: linear-gradient(180deg,var(--cream) 0%, #fff 100%);
        color: #0B1F3A;
    }

    /* NAVBAR */
    .navbar-custom{
        background: rgba(11,25,44,0.55);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .navbar-custom .nav-link{ color: #f7f9fb; font-weight:600; margin-right:.5rem; }
    .navbar-custom .nav-link:hover{ color: var(--accent); }
    .navbar-brand { font-weight:800; color:var(--accent); letter-spacing: -0.5px; }
    .nav-cta{ background:var(--accent); color:var(--dark); padding:9px 20px; border-radius:999px; font-weight:700; box-shadow:0 8px 24px rgba(249,168,38,0.12); }

    /* HERO (fond sombre) */
    .hero{
        background: linear-gradient(180deg,var(--dark) 0%, #071022 100%);
        color: #fff;
        padding: 80px 0;
        position: relative;
    }
    .hero .container{ z-index:2; position:relative; }
    .hero-badge{ background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); display:inline-flex; align-items:center; gap:10px; padding:8px 12px; border-radius:999px; font-size:0.95rem; margin-bottom:1rem; backdrop-filter: blur(6px); }
    .hero h1{ font-size: clamp(1.6rem, 4vw, 3.1rem); line-height:1.05; font-weight:800; margin-bottom:1rem; }
    .hero h1 em{ font-style:normal; color:var(--accent); font-weight:900; }
    .hero p.lead{ color: rgba(255,255,255,0.85); max-width:680px; margin-bottom:1.5rem; }

    .reco-card{
        background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
        border-radius: 18px;
        padding:18px;
        color:#fff;
        box-shadow: 0 12px 40px rgba(7,10,20,0.5);
        border: 1px solid rgba(255,255,255,0.03);
    }
    .receipt-amount{ font-size:1.6rem; font-weight:800; color:var(--accent); }
    .metrics{ display:flex; gap:12px; margin-top:12px; color:rgba(255,255,255,0.8); font-size:0.9rem; }

    /* Sections spacing and transitions (rythme) */
    section { padding: 60px 0; }
    .py-lg-6{ padding-top:6rem !important; padding-bottom:6rem !important; }
    .section-light{ background: var(--cream); }
    .section-dark{ background: var(--dark-2); color: #fff; }

    /* Badges assurances */
    .trust-badges { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    .trust-badges .badge{ background: #fff; color:var(--dark); padding:10px 14px; border-radius:12px; box-shadow:0 6px 18px rgba(11,25,44,0.06); font-weight:700; }

    /* Feature grid */
    .features .card{
        border-radius: var(--card-radius);
        box-shadow: 0 18px 40px rgba(12,18,30,0.06);
        border: none;
        transition: transform .35s ease, box-shadow .35s ease;
    }
    .features .card:hover{ transform: translateY(-8px); box-shadow: 0 30px 70px rgba(11,25,44,0.09); }

    /* Timeline */
    .timeline{ display:flex; gap:20px; flex-wrap:wrap; align-items:stretch; justify-content:center; }
    .timeline .step{ background: rgba(255,255,255,0.03); border-radius:16px; padding:28px; text-align:center; min-width:170px; color:#fff; box-shadow: 0 12px 30px rgba(0,0,0,0.25); }
    .step .num{ background: rgba(255,255,255,0.06); display:inline-block; width:52px; height:52px; line-height:52px; border-radius:999px; font-weight:800; color:var(--accent); margin-bottom:12px; }

    /* Stats */
    .stats{ display:flex; gap:20px; flex-wrap:wrap; justify-content:center; text-align:center; }
    .stat{ background: #fff; padding:18px; border-radius:14px; min-width:160px; box-shadow: 0 10px 30px rgba(11,25,44,0.06); }
    .stat .num{ font-weight:900; color:var(--dark); font-size:1.6rem; }

    /* Pricing */
    .pricing .card{ border-radius:18px; padding:22px; border:1px solid rgba(11,25,44,0.06); transition:transform .3s ease; }
    .pricing .card.featured{ background: var(--dark); color:#fff; border: none; box-shadow: 0 20px 60px rgba(10,17,40,0.45); transform: translateY(-4px); }
    .pricing .card.featured .btn{ background:var(--accent); color:var(--dark); font-weight:700; border-radius:999px; }
    .pricing .card:hover{ transform: translateY(-6px); }
    .pricing .card.featured:hover{ transform: scale(1.02); transition: transform .25s ease; }

    /* Testimonials */
    .testi .card{ border-radius:14px; padding:20px; border:none; background: linear-gradient(180deg,#061022 0%, rgba(6,16,34,0.6) 100%); color:#fff; box-shadow:0 12px 30px rgba(2,6,23,0.6); }
    .star{ color: #FCD34D; font-weight:800; }

    /* Final CTA */
    .final-cta{ background: linear-gradient(180deg,var(--dark) 0%, #041023 100%); color:#fff; padding:80px 0; text-align:center; }
    .final-cta .btn{ background:var(--accent); color:var(--dark); font-weight:800; padding:14px 28px; border-radius:999px; box-shadow:0 14px 50px rgba(249,168,38,0.12); }

    /* Footer */
    footer{ background: #071022; color: rgba(255,255,255,0.9); padding:40px 0; }
    footer a{ color: rgba(255,255,255,0.85); text-decoration:none; }
    footer a:hover{ color:var(--accent); }

    /* Responsive tweaks */
    @media (max-width: 991px){
        .timeline{ flex-direction:column; }
        .hero{ padding:60px 0; }
        .hero .row > [class*="col-"]{ margin-bottom:20px; }
    }
</style>
